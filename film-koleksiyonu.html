<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Koleksiyonu</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #222;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --text: #e8e2d9;
    --text-muted: #666;
    --hover: #1a1a1a;
    --stripe: #111;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 48px 32px;
  }

  header {
    max-width: 1100px;
    margin: 0 auto 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .title-block p {
    color: var(--text-muted);
    margin-top: 6px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  input[type="search"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    outline: none;
    width: 220px;
    letter-spacing: 0.03em;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--text-muted); }

  .count {
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  .count span { color: var(--accent); }

  .table-wrap {
    max-width: 1100px;
    margin: 0 auto;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    border-bottom: 2px solid var(--accent);
  }

  th {
    text-align: left;
    padding: 10px 16px;
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-weight: 500;
  }

  th:hover { color: var(--text); }

  th .sort-icon {
    display: inline-block;
    margin-left: 6px;
    opacity: 0.3;
    font-style: normal;
  }

  th.asc .sort-icon::after  { content: '↑'; opacity: 1; color: var(--accent); }
  th.desc .sort-icon::after { content: '↓'; opacity: 1; color: var(--accent); }
  th:not(.asc):not(.desc) .sort-icon::after { content: '↕'; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:nth-child(odd)  { background: var(--stripe); }
  tbody tr:nth-child(even) { background: var(--surface); }
  tbody tr:hover { background: var(--accent-dim); }

  td {
    padding: 9px 16px;
    line-height: 1.4;
  }

  td:first-child { color: var(--accent); width: 240px; }
  td:nth-child(2) { color: var(--text); }
  td:last-child { color: var(--text-muted); text-align: right; width: 80px; font-variant-numeric: tabular-nums; }

  .no-results {
    text-align: center;
    padding: 48px;
    color: var(--text-muted);
    font-style: italic;
  }

  .correction-tag {
    display: inline-block;
    background: rgba(200,169,110,0.15);
    color: var(--accent);
    font-size: 9px;
    padding: 1px 5px;
    margin-left: 6px;
    letter-spacing: 0.06em;
    vertical-align: middle;
    border: 1px solid rgba(200,169,110,0.3);
  }
</style>
</head>

    <p>Yönetmen · Film · Yıl</p>
  </div>
  <div class="controls">
    <input type="search" id="search" placeholder="Ara…" autocomplete="off">
    <div class="count">Gösterilen: <span id="count">—</span></div>
  </div>
</header>

<div class="table-wrap">

</div>

let sortState = { col: 0, dir: 'asc' };
let filtered = [...data];

const tbody = document.getElementById('tbody');
const countEl = document.getElementById('count');
const noResults = document.getElementById('noResults');
const searchEl = document.getElementById('search');

function render() {
  tbody.innerHTML = '';
  if (filtered.length === 0) {
    noResults.style.display = 'block';
    countEl.textContent = '0';
    return;
  }
  noResults.style.display = 'none';
  countEl.textContent = filtered.length;
  filtered.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td>`;
    tbody.appendChild(tr);
  });
}

function sortData(col) {
  if (sortState.col === col) {
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.col = col;
    sortState.dir = 'asc';
  }
  filtered.sort((a, b) => {
    const va = a[col], vb = b[col];
    let cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb), 'tr');
    return sortState.dir === 'asc' ? cmp : -cmp;
  });
  document.querySelectorAll('th').forEach((th, i) => {
    th.classList.remove('asc', 'desc');
    if (i === col) th.classList.add(sortState.dir);
  });
  render();
}

document.querySelectorAll('th').forEach(th => {
  th.addEventListener('click', () => sortData(+th.dataset.col));
});

searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase();
  filtered = data.filter(r => r[0].toLowerCase().includes(q) || r[1].toLowerCase().includes(q) || String(r[2]).includes(q));
  sortData(sortState.col);
});

// Initial sort by director
filtered.sort((a,b) => String(a[0]).localeCompare(String(b[0]),'tr'));
document.querySelector('th[data-col="0"]').classList.add('asc');
render();
